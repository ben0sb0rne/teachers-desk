<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Apply theme synchronously before any styles paint, to avoid a light->dark flash. -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('teachersdesk:v1');
        if (!raw) return;
        var t = JSON.parse(raw);
        t = t && t.preferences && t.preferences.theme;
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <title>Marble Race · The Teacher's Desk</title>
  <meta name="description" content="Marble Race — a pinball-parlor physics race that picks a full finishing order from your class roster. Part of The Teacher's Desk." />
  <link rel="stylesheet" href="../shared/desk.css" />
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="script.js"></script>
</head>
<body class="wood-bg">

  <div class="suite-topstrip">
    <nav class="suite-breadcrumb" aria-label="Breadcrumb">
      <a href="../" class="crumb-home" title="Back to The Teacher's Desk">
        <span>The Teacher's Desk</span>
      </a>
      <a href="#" id="crumb-tool" hidden>Marble Race</a>
      <span id="crumb-context" class="is-current" hidden></span>
    </nav>
    <div class="suite-topstrip-actions">
      <button type="button" class="settings-button" id="btn-settings-topstrip"
              aria-label="Settings" title="Settings (S)"></button>
      <button type="button" id="btn-fullscreen"
              title="Fullscreen (F)" aria-label="Enter fullscreen">
        <svg class="icon" aria-hidden="true"><use href="#icon-fullscreen"/></svg>
      </button>
    </div>
  </div>

  <!-- SVG icon sprite (same fullscreen glyphs as the wheel). -->
  <svg xmlns="http://www.w3.org/2000/svg" hidden aria-hidden="true" style="display:none">
    <symbol id="icon-fullscreen"      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></symbol>
    <symbol id="icon-fullscreen-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></symbol>
  </svg>

  <main class="race-main">

    <!-- Class-select view -->
    <section id="class-select-view" class="view">
      <header class="view-header">
        <h1>Pick a class</h1>
        <p class="muted">Every student races. The board fills as they finish.</p>
      </header>
      <div id="class-grid" class="race-class-grid" aria-live="polite"></div>
      <div id="class-empty" class="print-paper" hidden>
        <p>No classes yet.</p>
        <p class="muted">Create one in the Seating Chart or the Wheel first.</p>
      </div>
    </section>

    <!-- Race view -->
    <section id="race-view" class="view view--race" hidden>
      <header class="race-header">
        <h1 id="race-class-name">&nbsp;</h1>
        <div class="race-controls">
          <button type="button" id="btn-start">Launch</button>
          <button type="button" id="btn-reset" class="desk-button is-ghost">Reset</button>
        </div>
      </header>
      <!-- Track picker — one named playfield card per course. -->
      <div id="track-cards" class="track-cards" role="group" aria-label="Track"></div>
      <div class="race-stage">
        <canvas id="race-canvas" aria-label="Marble race course"></canvas>
        <aside class="race-board" aria-live="polite">
          <h2>Finish order</h2>
          <ol id="race-results"></ol>
        </aside>
      </div>
    </section>

  </main>
</body>
</html>
