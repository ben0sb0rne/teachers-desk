<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Apply theme synchronously before any styles paint, to avoid a light->dark flash. -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('teachersdesk:v1');
        if (!raw) return;
        var t = JSON.parse(raw);
        t = t && t.preferences && t.preferences.theme;
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <title>The Teacher's Desk</title>
  <meta name="description" content="A small, growing suite of free classroom tools — math bingo, seating charts, and more." />
  <link rel="stylesheet" href="shared/desk.css" />
  <style>
    /* Page-local layout only. No tokens here. */
    html, body { min-height: 100%; }
    body { display: flex; flex-direction: column; }
    main { flex: 1; }

    .desk-frame {
      min-height: 100%;
      padding: var(--space-6) var(--space-5) var(--space-7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .desk-inner {
      width: 100%;
      max-width: 880px;
    }

    header {
      text-align: center;
      margin-bottom: var(--space-6);
      color: rgb(var(--paper-cream));
    }
    header h1 {
      font-size: clamp(34px, 6vw, 64px);
      letter-spacing: -0.01em;
      margin: 0 0 var(--space-2);
    }
    header p {
      font-style: italic;
      font-size: var(--type-13);
      opacity: 0.85;
      margin: 0;
    }

    .placards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
    @media (max-width: 600px) {
      .placards { grid-template-columns: 1fr; }
    }

    footer {
      text-align: center;
      padding: var(--space-5) 0 0;
      color: rgb(var(--paper-cream));
      font-size: var(--type-13);
    }
    footer a { color: rgb(var(--paper-cream)); }

    /* Theme toggle in the footer — Auto / Light / Dark, plain text buttons. */
    .theme-toggle {
      display: inline-flex;
      gap: var(--space-2);
      align-items: baseline;
    }
    .theme-toggle button {
      background: none;
      border: none;
      color: rgb(var(--paper-cream));
      font: inherit;
      cursor: pointer;
      padding: 0 2px;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-decoration-color: rgb(var(--paper-cream) / 0.35);
      text-underline-offset: 3px;
    }
    .theme-toggle button:hover {
      text-decoration-color: rgb(var(--paper-cream));
    }
    .theme-toggle button.is-active {
      font-weight: 700;
      text-decoration-color: rgb(var(--paper-cream));
    }
    .theme-toggle button:focus-visible {
      outline: 2px solid rgb(var(--paper-cream) / 0.7);
      outline-offset: 2px;
      border-radius: var(--radius-tight);
    }
  </style>
</head>
<body class="wood-bg">
  <main class="desk-frame">
    <div class="desk-inner">
      <header>
        <h1>THE TEACHER'S DESK</h1>
        <p>A small, growing suite of classroom tools. Free, private, no accounts.</p>
      </header>

      <div class="placards">
        <a class="placard" href="bingo/index.html">
          <span class="placard-num">01</span>
          <span class="placard-title">Math Bingo</span>
          <span class="placard-sub">live caller for problem-set practice</span>
          <span class="placard-arrow">&rarr;</span>
        </a>

        <a class="placard" href="seating-chart/index.html">
          <span class="placard-num">02</span>
          <span class="placard-title">Seating Chart</span>
          <span class="placard-sub">classroom layouts with keep-apart constraints</span>
          <span class="placard-arrow">&rarr;</span>
        </a>

        <a class="placard is-disabled" aria-disabled="true">
          <span class="placard-num">03</span>
          <span class="placard-title">Name Picker</span>
          <span class="placard-sub">coming soon</span>
          <span class="placard-arrow">&rarr;</span>
        </a>
      </div>

      <footer>
        <a href="about.html">About</a>
        <span aria-hidden="true">&nbsp;&middot;&nbsp;</span>
        <a href="https://github.com/ben0sb0rne/teachers-desk">Source</a>
        <span aria-hidden="true">&nbsp;&middot;&nbsp;</span>
        <span class="theme-toggle" role="group" aria-label="Theme">
          <button type="button" data-theme-set="auto">Auto</button>
          <button type="button" data-theme-set="light">Light</button>
          <button type="button" data-theme-set="dark">Dark</button>
        </span>
      </footer>
    </div>
  </main>

  <script type="module">
    import { getTheme, setTheme } from './shared/storage.js';

    function syncActive() {
      const cur = getTheme();
      document.querySelectorAll('[data-theme-set]').forEach((btn) => {
        btn.classList.toggle('is-active', btn.dataset.themeSet === cur);
      });
    }
    syncActive();
    document.querySelectorAll('[data-theme-set]').forEach((btn) => {
      btn.addEventListener('click', () => {
        setTheme(btn.dataset.themeSet);
        syncActive();
      });
    });
  </script>
</body>
</html>
