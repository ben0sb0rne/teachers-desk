name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages allows one active deployment at a time. Don't cancel in-progress
# deploys (they could leave Pages half-published); queue them instead.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: seating-chart/package-lock.json

      - name: Install seating-chart dependencies
        working-directory: seating-chart
        run: npm ci

      - name: Build seating chart
        working-directory: seating-chart
        # base_path is "/teachers-desk" for the project page,
        # "" for user/custom-domain sites — both produce a valid URL.
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/seating-chart/
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # Static root pages
          cp index.html about.html _site/
          # Tools and shared assets that ship as-is
          cp -r bingo picker rosters shared assets _site/
          # Seating chart: deploy the BUILT output, not the source tree
          cp -r seating-chart/dist _site/seating-chart
          # Sanity check
          echo "--- _site tree ---"
          find _site -maxdepth 2 -type d | sort
          echo "--- _site file count ---"
          find _site -type f | wc -l

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
